augmentation:
  random_horizontal_flip: true
  random_resized_crop:
    scale:
    - 0.8
    - 1.0
    size: 224
cross_validation:
  n_splits: 3
  seed: 42
early_stopping:
  min_delta: 0.0
  monitor: val_loss
  patience: 7
epochs: 30
input_size: 224
lr:
  base_lr: 0.04
  eta_min: 0.0
  scheduler: cosine
  warmup_epochs: 5
  warmup_mode: per_step
  warmup_start_lr: 0.0
optimizer:
  momentum: 0.9
  nesterov: true
  type: SGD
  weight_decay: 0.0001
training:
  batch_size: 128
  loss: cross_entropy
